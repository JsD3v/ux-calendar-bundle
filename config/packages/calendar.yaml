# Calendar Bundle Configuration
# Reference/default configuration shipped with the bundle.
# It is NOT auto-loaded into your application. Generate your own
# config/packages/calendar.yaml by running:
#
#     php bin/console ux-calendar:install
#
# All values below are optional and fall back to the bundle defaults
# defined in Configuration.php.

calendar:
    theme: bootstrap
    assets:
        include_cdn: false
    route_prefix: /calendar
    views:
        enabled: [month]
        default: month
    features:
        all_day_events: true
        colors: true
