name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpunit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.4'
            stack: 'Symfony 8 / UX 3 / EasyAdmin 5 latest'
            constraints: >-
              symfony/framework-bundle:^8.0
              symfony/asset-mapper:^8.0
              symfony/console:^8.0
              symfony/form:^8.0
              symfony/validator:^8.0
              symfony/twig-bundle:^8.0
              symfony/translation:^8.0
              symfony/ux-turbo:^3.0
              symfony/stimulus-bundle:^3.0
            dev-constraints: >-
              symfony/yaml:^8.0
              symfony/ux-chartjs:^3.0
              easycorp/easyadmin-bundle:^5.0
            composer-flags: ''
    name: PHP ${{ matrix.php-version }} - ${{ matrix.stack }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          extensions: intl, pdo_sqlite
          tools: composer:v2
          ini-values: date.timezone=UTC
          cache: composer

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish --no-interaction

      - name: Apply compatibility constraints
        run: composer require --no-update --no-interaction ${{ matrix.constraints }}

      - name: Apply dev compatibility constraints
        run: composer require --dev --no-update --no-interaction ${{ matrix.dev-constraints }}

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --no-progress ${{ matrix.composer-flags }}

      - name: Run tests
        run: composer test
